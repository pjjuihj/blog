baseURL = 'https://cmj156.github.io/blog/'
languageCode = 'zh-cn'
title = 'CMJ的技术博客'
theme = 'PaperMod'

enableInlineShortcodes = true
enableRobotsTXT = true
enableEmoji = true

[params]
  author = 'cmj156'
  description = '嵌入式开发 | STM32 | 编程学习笔记'
  defaultTheme = 'auto'
  ShowShareButtons = true
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  ShowToc = true
  TocOpen = true
  ShowAllPagesInArchive = true
  ShowPageNums = true
  comments = true

  [params.profileMode]
    enabled = true
    title = '你好，我是 cmj156 👋'
    subtitle = '嵌入式开发爱好者，喜欢用代码控制硬件，记录 STM32、编程、技术折腾的日常。'
    imageUrl = 'https://avatars.githubusercontent.com/u/229704746'
    imageTitle = 'cmj156'

  [[params.profileMode.buttons]]
    name = '查看文章'
    url = '/posts'

  [[params.profileMode.buttons]]
    name = '关于我'
    url = '/about'

  [[params.socialIcons]]
    name = 'github'
    title = 'GitHub'
    url = 'https://github.com/cmj156'

  [[params.socialIcons]]
    name = 'email'
    title = 'Email'
    url = 'mailto:3386058487@qq.com'

  [params.editPost]
    URL = 'https://github.com/cmj156/blog/edit/main/content'
    Text = '在 GitHub 上编辑本页'
    appendFilePath = true

  [params.assets]
    disableHLJS = false

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    icon = ""
    text = "CMJ的技术博客"

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 30
  [[menu.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 35
  [[menu.main]]
    identifier = 'search'
    name = '搜索'
    url = '/search/'
    weight = 40
  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = 'monokai'
  [markup.goldmark.renderer]
    unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 4
  ordered = false

[params.Comments]
  enabled = true
  provider = 'giscus'

  [params.Comments.giscus]
    repo = 'cmj156/blog'
    repoId = 'R_kgDOS6-iow'
    category = 'Announcements'
    categoryId = 'DIC_kwDOS6-io84C_NOD'
    mapping = 'pathname'
    strict = false
    reactionsEnabled = true
    emitMetadata = 0
    inputPosition = 'bottom'
    lang = 'zh-CN'
    lightTheme = 'light'
    darkTheme = 'dark'
    lazyLoading = true

[params.SEO]
  title = 'CMJ的技术博客'
  description = '嵌入式开发、STM32、编程学习笔记和技术分享'
  images = ['']
  twitterSite = ''
  twitterCreator = '@your_twitter'
  type = 'website'
  locale = 'zh_CN'
  schema_type = 'Person'
  schema_name = 'cmj156'
  schema_url = 'https://github.com/cmj156'
